version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doc_retrieval_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docpassword}
      POSTGRES_DB: ${POSTGRES_DB:-docretrieval}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuser} -d ${POSTGRES_DB:-docretrieval}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
